<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Berhasil - Canvas Plant CC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-olive: #5A7B46;
            --brand-bright-green: #39db4a;
            --brand-dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            padding: 15px 0;
            background-color: white;
        }
        .brand-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #2b3a2f;
            line-height: 1;
            margin-bottom: 2px;
            text-decoration: none;
        }
        .brand-subtitle {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 500;
        }
        .btn-nav-outline {
            border: 2px solid var(--brand-olive);
            color: var(--brand-olive);
            border-radius: 50px;
            padding: 8px 24px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-nav-outline:hover {
            background-color: var(--brand-olive);
            color: white;
        }

        .success-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card-success {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            background-color: white;
            max-width: 500px;
            text-align: center;
            padding: 50px 40px;
        }

        .icon-success {
            font-size: 5rem;
            color: var(--brand-bright-green);
            margin-bottom: 20px;
        }

        .success-title {
            font-weight: 800;
            color: var(--brand-dark);
            margin-bottom: 15px;
        }

        .success-text {
            color: #6c757d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            background-color: var(--brand-olive);
            color: white;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-home:hover {
            background-color: #486338;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(90, 123, 70, 0.2);
        }
        .logo {
            border-radius: 20px;
            width: 90px;
            height: auto;
            padding-left: 10px;
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container">
            <img src="logo.jpeg" alt="Logo" class="logo">
            <a class="navbar-brand d-flex flex-column text-decoration-none" href="index.html">
                <span class="brand-title">Canvas Plant</span>
                <span class="brand-subtitle">Kolese Kanisius</span>
            </a>
            <div class="d-flex ms-auto">
                <a href="index.html" class="btn-nav-outline">Beranda</a>
            </div>
        </div>
    </nav>

    <div class="success-container">
        <div class="card card-success">
            <i class="bi bi-check-circle-fill icon-success"></i>
            <h2 class="success-title">Pendaftaran Berhasil!</h2>
            <p class="success-text">Terima kasih telah mendaftar sebagai relawan Canvas Plant. Data kamu sudah kami terima dengan baik. Silakan cek email kamu secara berkala untuk informasi lebih lanjut mengenai jadwal dan tautan grup koordinasi.</p>
            <div>
                <a href="index.html" class="btn-home">Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
